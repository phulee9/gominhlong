# =============================================================================
# PIPELINE CONFIGURATION
# Hướng dẫn: Thêm file excel mới bằng cách thêm entry vào section 'excel_files'
# =============================================================================

# ---- Kết nối hệ thống --------------------------------------------------------
connections:
  minio:
    endpoint: "localhost:9000"
    access_key: "admin"
    secret_key: "Inda1234"
    secure: false
    bucket_raw: "raw-excel"          # Bucket lưu file excel gốc

  postgresql:
    host: "172.19.32.1"             # <--- ĐÃ SỬA THÀNH IP CỦA WINDOWS
    port: 5432
    database: "postgres"
    user: "postgres"
    password: "Inda1234"
    schema_staging: "silver"        # Schema cho bảng bronze
    schema_silver: "silver"
    schema_gold: "gold"

# ---- Cấu hình mặc định -------------------------------------------------------
defaults:
  skip_rows_header: 0               # Số dòng bỏ qua trước header
  null_values: ["", "N/A", "NULL", "null", "None", "-"]
  encoding: "utf-8"
  date_format: "%d/%m/%Y"

# =============================================================================
# DANH SÁCH FILE EXCEL CẦN XỬ LÝ
# =============================================================================
excel_files:

# ===========================================================================
  # LUỒNG NẠP THẲNG ĐỐI TÁC (DIM_PARTNER) - KẾT HỢP KHÁCH HÀNG & NHÀ CUNG CẤP
  # ===========================================================================

  # A. PHẦN NẠP DỮ LIỆU KHÁCH HÀNG (Xóa trắng bảng và nạp mới)
  - file_id: "dim_partner_khach_hang"
    description: "Danh mục đối tác - Nhóm Khách hàng"
    type: "single_table"
    source_pattern: "data/raw/misa/Danh_sach_khach_hang*.xlsx"
    minio_prefix: "misa/Danh_sach_khach_hang"
    sheets:
      - sheet_index: 0
        header_row: 3
        data_start_row: 4
        target_table: "Dim_Partner"
        transformer_class: "dim_partner"
        truncate_before_load: true
        restart_identity: true

        field_mapping:
          - source: "Mã khách hàng"
            target: "Partner_Code"
            dtype: "varchar(100)"
          - source: "Tên khách hàng"
            target: "Partner_Name"
            dtype: "text"
          - source: "Địa chỉ"
            target: "Address"
            dtype: "text"
          - source: "Mã số thuế"
            target: "Tax"
            dtype: "varchar(50)"

        metadata_columns:
          - name: "Partner_Group"    # Đặt ở đây để database tự tạo cột tracking cấu trúc
            dtype: "varchar(100)"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"

  # B. PHẦN NẠP DỮ LIỆU NHÀ CUNG CẤP (Ghi nối tiếp vào bảng trên)
  - file_id: "dim_partner_nha_cung_cap"
    description: "Danh mục đối tác - Nhóm Nhà cung cấp"
    type: "single_table"
    source_pattern: "data/raw/misa/Danh_sach_nha_cung_cap*.xlsx"
    minio_prefix: "misa/Danh_sach_nha_cung_cap"
    sheets:
      - sheet_index: 0
        header_row: 3
        data_start_row: 4
        target_table: "Dim_Partner"
        transformer_class: "dim_partner"
        # QUAN TRỌNG: Phải là true dù tên gợi ý "append"
        # Lý do: transformer DimPartner (batch 2) gọi ctx.lookup("Dim_Partner")
        # để đọc KH từ DB TRƯỚC khi load_dataframe() chạy — thứ tự thực tế là:
        #   transform() → lookup KH từ DB → dedup KH+NCC → load_dataframe() → TRUNCATE → INSERT kết quả
        # Nên lúc truncate, KH đã được đọc xong và nằm trong df_final rồi.
        # Kết quả sau truncate: bảng chứa đủ KH_pure + NCC_pure + trùng (KH/NCC)
        # KHÔNG được đổi thành false — sẽ bị duplicate dữ liệu KH từ batch 1
        truncate_before_load: true
        restart_identity: true

        field_mapping:
          - source: "Mã nhà cung cấp"
            target: "Partner_Code"
            dtype: "varchar(100)"
          - source: "Tên nhà cung cấp"
            target: "Partner_Name"
            dtype: "text"
          - source: "Địa chỉ"
            target: "Address"
            dtype: "text"
          - source: "Mã số thuế"
            target: "Tax"
            dtype: "varchar(50)"

        metadata_columns:
          - name: "Partner_Group"
            dtype: "varchar(100)"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ---------------------------------------------------------------------------
  # 5. DANH MỤC TÀI KHOẢN KẾ TOÁN (DIM_ACCOUNT)
  # ---------------------------------------------------------------------------
  - file_id: "dim_account"
    description: "Danh mục hệ thống tài khoản kế toán và số tài khoản ngân hàng định danh"
    type: "single_table"
    source_pattern: "data/raw/misa/Danh_sach_he_thong_tai_khoan*.xlsx"
    minio_prefix: "misa/Danh_sach_he_thong_tai_khoan"
    
    sheets:
      - sheet_index: 0
        header_row: 3
        data_start_row: 4
        target_table: "Dim_Account"
        transformer_class: "dim_account"
        truncate_before_load: true
        restart_identity: true

        field_mapping:
          - source: "Số tài khoản"
            target: "Account_No"
            dtype: "varchar(50)"
          - source: "Tên tài khoản"
            target: "Account_Name"
            dtype: "varchar(500)"

        metadata_columns:
          - name: "Account_BANK"     # Trường tự động xử lý bóc tách bằng Python
            dtype: "varchar(100)"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ---------------------------------------------------------------------------
  # 6. SỐ TÀI KHOẢN NGÂN HÀNG (DIM_ACCOUNTNUMBER)
  # ---------------------------------------------------------------------------
  - file_id: "dim_account_number"
    description: "Danh mục số tài khoản ngân hàng và mã ngân hàng tương ứng"
    type: "single_table"
    source_pattern: "data/raw/misa/Danh_sach_tai_khoan_ngan_hang*.xlsx"
    minio_prefix: "misa/Danh_sach_tai_khoan_ngan_hang"
    sheets:
      - sheet_index: 0
        header_row: 3
        data_start_row: 4
        target_table: "Dim_AccountNumber"
        transformer_class: "dim_account_number"
        # Dim_AccountNumber
        truncate_before_load: true
        restart_identity: true

        field_mapping:
          - source: "Số tài khoản"
            target: "Account_Bank"
            dtype: "varchar(100)"
          - source: "Tên ngân hàng"
            target: "Bank_Name"
            dtype: "varchar(255)"

        metadata_columns:
          - name: "Bank_Code"        # Cột này sẽ được Python tự động dò tìm (Lookup)
            dtype: "varchar(50)"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ---------------------------------------------------------------------------
  # 7. DANH MỤC NGÂN HÀNG (DIM_BANK)
  # ---------------------------------------------------------------------------
  - file_id: "dim_bank"
    description: "Danh mục ngân hàng - Silver"
    type: "single_table"
    source_pattern: "data/raw/misa/Danh_sach_ngan_hang*.xlsx"
    minio_prefix: "misa/Danh_sach_ngan_hang"
    sheets:
      - sheet_index: 0
        header_row: 3
        data_start_row: 4
        target_table: "Dim_Bank"
        transformer_class: "dim_bank"     # THÊM
        truncate_before_load: true
        restart_identity: true
        field_mapping:
          - source: "Tên viết tắt"
            target: "Bank_Code"
            dtype: "varchar(50)"
          - source: "Tên đầy đủ"
            target: "Bank_Name"
            dtype: "varchar(500)"
        metadata_columns:
          - name: "Code1"                 # THÊM
            dtype: "varchar(50)"
          - name: "Code2"
            dtype: "varchar(50)"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ---------------------------------------------------------------------------
  # 8. DANH MỤC KHO BÃI (DIM_WAREHOUSE)
  # ---------------------------------------------------------------------------
  - file_id: "dim_warehouse"
    description: "Danh mục kho bãi - Lớp Silver"
    type: "single_table"
    source_pattern: "data/raw/misa/Danh_sach_kho*.xlsx"
    minio_prefix: "misa/Danh_sach_kho"
    sheets:
      - sheet_index: 0
        header_row: 3                   # Bỏ dòng 1-2, tiêu đề nằm ở dòng 3 (index 2 trong pandas)
        data_start_row: 4               # Dữ liệu thực tế bắt đầu từ dòng 4
        target_table: "Dim_Warehouse"
        truncate_before_load: true
        restart_identity: true

        field_mapping:
          - source: "Mã kho"
            target: "Warehouse_Code"
            dtype: "varchar(100)"
            
          - source: "Tên kho"
            target: "Warehouse_Name"
            dtype: "varchar(255)"

        metadata_columns:
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ---------------------------------------------------------------------------
  # 9. DANH MỤC SẢN PHẨM (DIM_PRODUCT)
  # ---------------------------------------------------------------------------
  - file_id: "dim_product"
    description: "Danh mục vật tư, sản phẩm, hàng hóa - Lớp Silver"
    type: "single_table"
    source_pattern: "data/raw/misa/Danh_sach_hang_hoa_dich_vu*.xlsx"
    minio_prefix: "misa/Danh_sach_hang_hoa_dich_vu"
    sheets:
      - sheet_index: 0
        header_row: 3                   # Bỏ dòng 1-2, tiêu đề ở dòng 3
        data_start_row: 4               # Dữ liệu từ dòng 4
        target_table: "Dim_Product"
        transformer_class: "dim_product"
        truncate_before_load: true      # Xóa sạch bảng cũ để làm mới danh mục
        read_all_sheets: true 
        restart_identity: true


        field_mapping:
          - source: "Mã"                    # ← đúng tên cột trong file
            target: "Product_Code"
            dtype: "varchar(255)"
          - source: "Tên"                   # ← đúng tên cột trong file
            target: "Product_Name"
            dtype: "text"
          - source: "Đơn vị tính chính"    # ← đúng tên cột trong file
            target: "Unit_of_Measure"
            dtype: "varchar(50)"

        metadata_columns:
          - name: "Product_Category"
            dtype: "varchar(100)"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ===========================================================================
  # LUỒNG GỘP DANH MỤC CHỈ TIÊU BÁO CÁO TÀI CHÍNH (DIM_REPORTITEM)
  # ===========================================================================

  # PHẦN A. ĐỌC CHỈ TIÊU TỪ BÁO CÁO TÌNH HÌNH TÀI CHÍNH (B01-DN)
  - file_id: "dim_report_item_b01"
    description: "Danh mục chỉ tiêu báo cáo tài chính B01-DN"
    type: "single_table"
    source_pattern: "data/raw/misa/B01*DN*.xlsx"   # Khớp các file B01 DN
    minio_prefix: "misa/b01_bao_cao_tai_chinh"
    sheets:
      - sheet_index: 0
        header_row: 12                  # Bỏ qua dòng 1-11, tiêu đề ở dòng 12
        data_start_row: 13              # Dữ liệu bắt đầu từ dòng 13
        target_table: "Dim_ReportItem"
        transformer_class: "dim_report_item"
        truncate_before_load: true      # Xóa sạch bảng cũ để nạp mới từ đầu
        restart_identity: true

        # Định nghĩa rỗng để Python tự quét cột động dựa vào vị trí A:J và K:L
        field_mapping: []

        metadata_columns:
          - name: "Item_ID"             # Khóa chính: {Report_Type}_{Item_Code}
            dtype: "varchar(100)"
          - name: "Report_Type"         # Phân loại: B01-DN
            dtype: "varchar(50)"
          - name: "Item_Code"           # Mã số chỉ tiêu
            dtype: "varchar(50)"
          - name: "Item_Name"           # Tên chỉ tiêu đầy đủ
            dtype: "varchar(500)"
          - name: "Parent_ID"           # Mã chỉ tiêu cấp cha
            dtype: "varchar(100)"
          - name: "Sort_Index"          # Chỉ số sắp xếp thứ tự
            dtype: "integer"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"

  # PHẦN B. ĐỌC CHỈ TIÊU TỪ BÁO CÁO KẾT QUẢ HOẠT ĐỘNG KINH DOANH (B02-DN)
  - file_id: "dim_report_item_b02"
    description: "Danh mục chỉ tiêu báo cáo tài chính B02-DN"
    type: "single_table"
    source_pattern: "data/raw/misa/B02*DN*.xlsx"   # Khớp các file B02 DN
    minio_prefix: "misa/b02_bao_cao_hoat_dong_kinh_doanh"
    sheets:
      - sheet_index: 0
        header_row: 7                   # Bỏ qua dòng 1-6, tiêu đề ở dòng 7
        data_start_row: 8               # Dữ liệu bắt đầu từ dòng 8
        target_table: "Dim_ReportItem"
        transformer_class: "dim_report_item"
        truncate_before_load: false     # KHÔNG TRUNCATE để giữ lại dữ liệu B01 vừa nạp

        field_mapping: []

        metadata_columns:
          - name: "Item_ID"
            dtype: "varchar(100)"
          - name: "Report_Type"
            dtype: "varchar(50)"
          - name: "Item_Code"
            dtype: "varchar(50)"
          - name: "Item_Name"
            dtype: "varchar(500)"
          - name: "Parent_ID"
            dtype: "varchar(100)"
          - name: "Sort_Index"
            dtype: "integer"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ===========================================================================
  # NHÓM BẢNG FACT (BẢNG SỰ KIỆN PHÁT SINH)
  # ===========================================================================

  # 1. FACT XUẤT KHO / BÁN HÀNG (FACT_INVENTORY_OUTWARD)
  - file_id: "fact_inventory_outward"
    description: "Sổ chi tiết bán hàng - Ghi nhận xuất kho bán hàng"
    type: "single_table"
    source_pattern: "data/raw/misa/So_chi_tiet_ban_hang*.xlsx"
    minio_prefix: "misa/So_chi_tiet_ban_hang"
    sheets:
      - sheet_index: 0
        header_row: 8                   # Bỏ dòng 1-7, tiêu đề nằm ở dòng 8
        data_start_row: 9               # Dữ liệu phát sinh bắt đầu từ dòng 9
        target_table: "Fact_InventoryOutward"
        transformer_class: "fact_inventory_outward"
        
        # Bảng Fact KHÔNG TRUNCATE để dùng cơ chế Delete - Insert (Rollback theo kỳ)
        truncate_before_load: false     
        
        # ĐIỀU KIỆN ROLLBACK (Ví dụ: Xóa sạch dữ liệu tháng 6/2026 trước khi nạp lại file tháng 6)
        # Khi bạn nạp file của tháng khác, hãy sửa lại ngày ở điều kiện này cho khớp.
        delete_condition: "Posting_Date >= '{min_date}' AND Posting_Date <= '{max_date}'"

        field_mapping:
          - source: "Ngày hạch toán"
            target: "Posting_Date"
            dtype: "date"
          - source: "Số chứng từ"
            target: "Voucher_No"
            dtype: "varchar(100)"
          - source: "Số hóa đơn"
            target: "Invoice_No"
            dtype: "varchar(100)"
          - source: "Ngày hóa đơn"
            target: "Invoice_Date"
            dtype: "date"
          - source: "Mã kho"
            target: "Warehouse_Code"
            dtype: "varchar(100)"
          - source: "Mã hàng"
            target: "Product_Code"
            dtype: "varchar(255)"
          - source: "Mã khách hàng"
            target: "Partner_Code"
            dtype: "varchar(100)"
          - source: "Loại tiền"
            target: "Currency"
            dtype: "varchar(50)"
          - source: "Tỷ giá"
            target: "Exchange_Rate"
            dtype: "float"
          - source: "Tổng số lượng bán"
            target: "Outward_Quantity"
            dtype: "float"
          - source: "Doanh số bán"
            target: "Outward_Value"
            dtype: "float"

        metadata_columns:
          - name: "ID"                  # Trường STT tự động sinh bằng Python
            dtype: "integer"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ---------------------------------------------------------------------------
  # 2. FACT NHẬP KHO / MUA HÀNG (FACT_INVENTORY_INWARD)
  # ---------------------------------------------------------------------------
  - file_id: "fact_inventory_inward"
    description: "Sổ chi tiết mua hàng - Ghi nhận nhập kho vật tư hàng hóa"
    type: "single_table"
    source_pattern: "data/raw/misa/So_chi_tiet_mua_hang*.xlsx"
    minio_prefix: "misa/So_chi_tiet_mua_hang"
    sheets:
      - sheet_index: 0
        header_row: 8                   # Bỏ dòng 1-7, tiêu đề ở dòng 8
        data_start_row: 9               # Dữ liệu từ dòng 9
        target_table: "Fact_InventoryInward"
        transformer_class: "fact_inventory_inward"
        
        # KHÔNG TRUNCATE để giữ lịch sử, dùng cơ chế Rollback theo kỳ
        truncate_before_load: false
        
        # Điều kiện xóa dữ liệu cũ (Rollback) trước khi nạp lại
        # Lưu ý: Cập nhật điều kiện này theo đúng tháng của file bạn định nạp
        delete_condition: "Posting_Date >= '{min_date}' AND Posting_Date <= '{max_date}'"

        field_mapping:
          - source: "Ngày hạch toán"
            target: "Posting_Date"
            dtype: "date"
          - source: "Số chứng từ"
            target: "Voucher_No"
            dtype: "varchar(100)"
          - source: "Số hóa đơn"
            target: "Invoice_No"
            dtype: "varchar(100)"
          - source: "Ngày hóa đơn"
            target: "Invoice_Date"
            dtype: "date"
          - source: "Mã kho"
            target: "Warehouse_Code"
            dtype: "varchar(100)"
          - source: "Mã hàng"
            target: "Product_Code"
            dtype: "varchar(255)"
          - source: "Mã nhà cung cấp"
            target: "Partner_Code"
            dtype: "varchar(100)"
          - source: "Loại tiền"
            target: "Currency"
            dtype: "varchar(50)"
          - source: "Tỷ giá"
            target: "Exchange_Rate"
            dtype: "float"
          - source: "Số lượng mua"
            target: "Inward_Quantity"
            dtype: "float"
          - source: "Giá trị mua"       # Lưu ý sửa lỗi chính tả ở đây nếu file báo lỗi "Gía" hay "Giá"
            target: "Inward_Value"
            dtype: "numeric(18,2)"

        metadata_columns:
          - name: "ID"                  # STT sinh tự động
            dtype: "integer"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
  # ---------------------------------------------------------------------------
  # 3. FACT TỒN KHO (FACT_INVENTORY_BALANCE)
  # ---------------------------------------------------------------------------
  - file_id: "fact_inventory_balance"
    description: "Tổng hợp tồn kho - Ghi nhận chốt số lượng/giá trị tồn cuối kỳ"
    type: "single_table"
    source_pattern: "data/raw/misa/Tong_hop_ton_kho*.xlsx"
    minio_prefix: "misa/Tong_hop_ton_kho"
    sheets:
      - sheet_index: 0
        header_row: [8, 9]              # Khai báo mảng để gộp dòng tiêu đề 8 và 9
        data_start_row: 10              # Dữ liệu chạy từ dòng 10
        target_table: "Fact_Inventory_Balance"
        transformer_class: "fact_inventory_balance"
        truncate_before_load: false     # ← giữ lịch sử các tháng

        delete_condition: "Snapshot_Date = '{max_date}'"

        field_mapping:
          - source: "Mã kho"
            target: "Warehouse_Code"
            dtype: "varchar(100)"
          - source: "Mã hàng"
            target: "Product_Code"
            dtype: "varchar(255)"
          - source: "Cuối kỳ_Số lượng"
            target: "Ending_Quantity"
            dtype: "float"                  # Nên dùng float thay vì int vì MISA có số thập phân
          - source: "Cuối kỳ_Giá trị"
            target: "Ending_Value"
            dtype: "numeric(18,2)"

        metadata_columns:
          - name: "ID"
            dtype: "integer"
