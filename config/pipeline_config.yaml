        target_table: "Fact_TermDeposit"
        transformer_class: "fact_term_deposit"
        truncate_before_load: true
        restart_identity: true

        field_mapping:
          # NOTE: STT được thêm vào để transformer dùng làm tín hiệu lọc bỏ
          # các "dòng tổng nhóm" (subtotal rows theo công ty/ngân hàng, ví dụ
          # SỐ SỔ = 'MINH LONG', 'MB', 'HD', 'LP', 'AGR', 'IVB', 'WOORI', 'VP').
          # Các dòng tổng này luôn có STT trống, còn dòng hợp đồng thật luôn
          # có STT là số nguyên tăng dần. Không map STT -> target sẽ khiến
          # transformer không có cột để filter và lọt dòng tổng vào bảng fact.
          - source: "STT"
            target: "STT"
            dtype: "integer"
          - source: "SỐ SỔ"             # bỏ dấu cách cuối trong header gốc
            target: "Passbook_No"
            dtype: "varchar(100)"
          - source: "BANK"
            target: "Bank_Code"
            dtype: "varchar(50)"
          - source: "LS (%)"
            target: "Interest_Rate"
            dtype: "float"
          - source: "KỲ HẠN"
            target: "Term"
            dtype: "integer"
          - source: "TRỊ GIÁ GỐC"      # cột G — đúng với mapping nghiệp vụ cung cấp
            target: "Original_Amount"
            dtype: "numeric(18,2)"
          - source: "GIÁ TRỊ CÒN LẠI"   # cột L — đúng với mapping nghiệp vụ cung cấp
            target: "Remaining_Value"
            dtype: "numeric(18,2)"
          - source: "NGÀY GỬI"
            target: "Deposit_Date"
            dtype: "date"
          - source: "NGÀY ĐÁO"          # bỏ dấu cách cuối trong header gốc
            target: "Maturity_Date"
            dtype: "date"
          - source: "NGÀY T/TOÁN"
            target: "Settlement_Date"
            dtype: "date"
        metadata_columns:
          - name: "ID"
            dtype: "integer"
          - name: "_source_file"
            dtype: "varchar(500)"
          - name: "_loaded_at"
            dtype: "timestamp"
          - name: "_batch_id"
            dtype: "varchar(100)"
